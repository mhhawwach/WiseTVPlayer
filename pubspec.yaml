name: wisetv_player
description: WiseVodPlayer — fast, polished IPTV/VOD player for Android TV, Fire TV, and phones.
publish_to: 'none'
version: 1.0.7+8

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State management ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # --- Navigation ---
  go_router: ^14.2.0

  # --- Media player (fastest Flutter player, libmpv-based) ---
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # --- Tizen / Samsung TV player (uses native capi-media-player) ---
  # video_player is the cross-platform fallback; on Tizen builds, add
  # video_player_tizen via flutter-tizen's pub to bind the native player.
  # On Android/iOS this is present but unused (PlayerFactory picks media_kit).
  video_player: ^2.9.1

  # --- HTTP ---
  dio: ^5.4.3+1

  # --- Local storage (fast binary key-value) ---
  hive_flutter: ^1.1.0

  # --- Localizations (RTL + locale delegates) ---
  flutter_localizations:
    sdk: flutter

  # --- Image loading ---
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1

  # --- Icons ---
  cupertino_icons: ^1.0.8

  # --- UI utilities ---
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  flutter_staggered_grid_view: ^0.7.0

  # --- Device / platform ---
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  wakelock_plus: ^1.2.0

  # --- Misc ---
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  collection: ^1.18.0
  path_provider: ^2.1.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  # build_runner + generators: add back if you use @riverpod or modify the Playlist model
  # riverpod_generator and hive_generator removed — both conflict with Dart 3.7 SDK
  # (hive_generator 2.x pulls analyzer into macros/_macros which is not in the stable SDK)
  # playlist.g.dart and any Riverpod providers are hand-written or already committed.
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# ── flutter_launcher_icons config ──────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true          # App Store requires no alpha channel
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  # Adaptive icon (Android 8+)
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  # fonts: (no custom fonts bundled — app uses system font)
